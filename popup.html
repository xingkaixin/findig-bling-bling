<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>融美美 - findig-bling-bling</title>
  <style>
    body {
      width: 350px;
      padding: 20px;
      font-family: Arial, sans-serif;
      font-size: 14px;
    }
    .header {
      text-align: center;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 2px solid #409EFF;
    }
    .header h1 {
      margin: 0;
      font-size: 18px;
      color: #303133;
    }
    .header .subtitle {
      font-size: 12px;
      color: #909399;
      margin-top: 5px;
    }
    .status {
      background-color: #f0f9ff;
      border: 1px solid #b3d8ff;
      border-radius: 4px;
      padding: 10px;
      margin-bottom: 15px;
    }
    .status-title {
      font-weight: bold;
      color: #409EFF;
      margin-bottom: 5px;
    }
    .status-item {
      font-size: 12px;
      color: #606266;
      margin: 3px 0;
    }
    .website-status {
      background-color: #f4f4f5;
      border-radius: 4px;
      padding: 10px;
      margin-bottom: 15px;
    }
    .website-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid #ebeef5;
    }
    .website-item:last-child {
      border-bottom: none;
    }
    .website-url {
      font-size: 11px;
      color: #606266;
      word-break: break-all;
      flex: 1;
    }
    .website-badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 3px;
      margin-left: 8px;
    }
    .badge-enabled {
      background: #67c23a;
      color: white;
    }
    .add-website {
      background: #409eff;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 8px 16px;
      font-size: 12px;
      cursor: pointer;
      width: 100%;
      margin-bottom: 10px;
    }
    .add-website:hover {
      background: #66b1ff;
    }
    .input-group {
      display: none;
      margin-bottom: 10px;
    }
    .url-input {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #dcdfe6;
      border-radius: 4px;
      font-size: 12px;
      margin-bottom: 8px;
    }
    .button-group {
      display: flex;
      gap: 8px;
    }
    .btn {
      flex: 1;
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
    }
    .btn-confirm {
      background: #67c23a;
      color: white;
    }
    .btn-cancel {
      background: #909399;
      color: white;
    }
    .btn-remove {
      background: #f56c6c;
      color: white;
      padding: 2px 6px;
      font-size: 10px;
    }
    .btn:hover {
      opacity: 0.8;
    }
    .instructions {
      background-color: #f4f4f5;
      border-radius: 4px;
      padding: 10px;
      font-size: 12px;
      color: #606266;
      line-height: 1.5;
    }
    .instructions h3 {
      margin: 0 0 8px 0;
      font-size: 14px;
      color: #303133;
    }
    .instructions ol {
      margin: 0;
      padding-left: 20px;
    }
    .instructions li {
      margin-bottom: 5px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>融美美</h1>
    <div class="subtitle">findig-bling-bling</div>
  </div>

  <div class="status">
    <div class="status-title">扩展状态</div>
    <div class="status-item" id="extension-status">✅ 已激活</div>
  </div>

  <div class="website-status">
    <div class="status-title">网站管理</div>
    <div id="website-list"></div>
    <button class="add-website" id="add-website-btn">+ 添加网站</button>
    <div class="input-group" id="input-group">
      <input type="text" class="url-input" id="url-input" placeholder="输入网站URL，如: https://example.com">
      <div class="button-group">
        <button class="btn btn-confirm" id="confirm-btn">确认</button>
        <button class="btn btn-cancel" id="cancel-btn">取消</button>
      </div>
    </div>
  </div>

  <div class="instructions">
    <h3>使用说明</h3>
    <ol>
      <li>访问目标网站</li>
      <li>点击扩展图标</li>
      <li>点击"添加网站"按钮添加当前网站</li>
      <li>点击页面中的JSON数据查看按钮</li>
      <li>点击"🚀 渲染数据链路图"进行可视化</li>
    </ol>
  </div>

  <script src="popup.js"></script>
</body>
</html>
